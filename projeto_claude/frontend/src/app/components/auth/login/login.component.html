<div class="min-vh-100 d-flex align-items-center justify-content-center bg-light">
  <div class="card shadow-sm" style="width: 100%; max-width: 420px;">
    <div class="card-body p-4">
      <div class="text-center mb-4">
        <i class="bi bi-kanban fs-1 text-primary"></i>
        <h4 class="mt-2 fw-bold">Projeto Tarefas</h4>
        <p class="text-muted small">Entre com sua conta</p>
      </div>

      <div *ngIf="errorMessage" class="alert alert-danger py-2">
        <i class="bi bi-exclamation-triangle me-2"></i>{{ errorMessage }}
      </div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
          <label class="form-label fw-semibold">Email</label>
          <input
            type="email"
            class="form-control"
            [class.is-invalid]="form.get('email')?.invalid && form.get('email')?.touched"
            formControlName="email"
            placeholder="seu@email.com"
            autocomplete="email"
          />
          <div class="invalid-feedback">Email inválido.</div>
        </div>

        <div class="mb-4">
          <label class="form-label fw-semibold">Senha</label>
          <input
            type="password"
            class="form-control"
            [class.is-invalid]="form.get('password')?.invalid && form.get('password')?.touched"
            formControlName="password"
            placeholder="Sua senha"
            autocomplete="current-password"
          />
          <div class="invalid-feedback">Senha é obrigatória.</div>
        </div>

        <button
          type="submit"
          class="btn btn-primary w-100"
          [disabled]="loading"
        >
          <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
          <i *ngIf="!loading" class="bi bi-box-arrow-in-right me-2"></i>
          {{ loading ? 'Entrando...' : 'Entrar' }}
        </button>
      </form>

      <hr class="my-4">

      <p class="text-center text-muted small mb-0">
        Não tem uma conta?
        <a routerLink="/register" class="text-primary fw-semibold text-decoration-none">Criar conta</a>
      </p>
    </div>
  </div>
</div>
