<div class="page-header">
  <h2>
    <i class="bi bi-folder me-2 text-primary"></i>
    {{ isEdit ? 'Edit Project' : 'New Project' }}
  </h2>
</div>

<div *ngIf="loading" class="loading-spinner">
  <div class="spinner-border text-primary" role="status">
    <span class="visually-hidden">Loading...</span>
  </div>
</div>

<div *ngIf="error" class="alert alert-danger" role="alert">
  <i class="bi bi-exclamation-triangle me-2"></i>{{ error }}
</div>

<div *ngIf="!loading" class="card">
  <div class="card-header">
    {{ isEdit ? 'Edit project details' : 'Fill in the project details' }}
  </div>
  <div class="card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="row">
        <div class="col-md-8 mb-3">
          <label for="name" class="form-label">
            Name <span class="required-star">*</span>
          </label>
          <input
            id="name"
            type="text"
            class="form-control"
            formControlName="name"
            [class.is-invalid]="f['name'].touched && f['name'].invalid"
            placeholder="Project name"
          />
          <div class="invalid-feedback">
            <span *ngIf="f['name'].errors?.['required']">Name is required.</span>
            <span *ngIf="f['name'].errors?.['maxlength']">Name cannot exceed 200 characters.</span>
          </div>
        </div>

        <div class="col-md-4 mb-3">
          <label for="status" class="form-label">
            Status <span class="required-star">*</span>
          </label>
          <select
            id="status"
            class="form-select"
            formControlName="status"
            [class.is-invalid]="f['status'].touched && f['status'].invalid"
          >
            <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
          </select>
          <div class="invalid-feedback">Status is required.</div>
        </div>
      </div>

      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea
          id="description"
          class="form-control"
          formControlName="description"
          [class.is-invalid]="f['description'].touched && f['description'].invalid"
          rows="3"
          placeholder="Optional description"
        ></textarea>
        <div class="invalid-feedback">Description cannot exceed 1000 characters.</div>
      </div>

      <div class="col-md-4 mb-4">
        <label for="startDate" class="form-label">
          Start Date <span class="required-star">*</span>
        </label>
        <input
          id="startDate"
          type="date"
          class="form-control"
          formControlName="startDate"
          [class.is-invalid]="f['startDate'].touched && f['startDate'].invalid"
        />
        <div class="invalid-feedback">Start date is required.</div>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary" [disabled]="saving">
          <span *ngIf="saving" class="spinner-border spinner-border-sm me-2" role="status"></span>
          <i *ngIf="!saving" class="bi bi-check-lg me-1"></i>
          {{ isEdit ? 'Update Project' : 'Create Project' }}
        </button>
        <button type="button" class="btn btn-outline-secondary" (click)="onCancel()" [disabled]="saving">
          <i class="bi bi-x-lg me-1"></i>Cancel
        </button>
      </div>
    </form>
  </div>
</div>
